{% extends 'base.html' %}
{% block title %}Admin Login | AI-Solution{% endblock %}

{% block content %}

<style>
    .clean-admin-login {
        min-height: calc(100vh - 78px);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 70px 20px;
        background: linear-gradient(120deg, #23d7bd 0%, #1c63b7 100%);
        position: relative;
        overflow: hidden;
    }

    .clean-admin-login::before {
        content: "";
        position: absolute;
        inset: 0;
        opacity: 0.22;
        background-image:
            linear-gradient(30deg, rgba(255,255,255,.25) 12%, transparent 12.5%, transparent 87%, rgba(255,255,255,.25) 87.5%, rgba(255,255,255,.25)),
            linear-gradient(150deg, rgba(255,255,255,.25) 12%, transparent 12.5%, transparent 87%, rgba(255,255,255,.25) 87.5%, rgba(255,255,255,.25));
        background-size: 72px 125px;
    }

    .clean-login-card {
        position: relative;
        width: min(520px, 100%);
        background: #ffffff;
        border-radius: 28px;
        padding: 44px;
        box-shadow: 0 28px 80px rgba(16, 24, 39, 0.22);
    }

    .clean-login-card span {
        display: block;
        color: #16d6bd;
        font-weight: 900;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        font-size: 14px;
        margin-bottom: 12px;
    }

    .clean-login-card h1 {
        color: #101827;
        font-size: 48px;
        margin: 0 0 12px;
        letter-spacing: -0.05em;
    }

    .clean-login-card p {
        color: #667085;
        line-height: 1.7;
        margin: 0 0 28px;
    }

    .clean-login-card form {
        display: grid;
        gap: 16px;
    }

    .clean-login-card input {
        width: 100%;
        border: 1px solid #e7edf4;
        border-radius: 18px;
        padding: 17px 18px;
        font-size: 16px;
        outline: none;
    }

    .clean-login-card input:focus {
        border-color: #16d6bd;
        box-shadow: 0 0 0 4px rgba(22, 214, 189, 0.16);
    }

    .clean-login-card button {
        width: 100%;
        border: 0;
        border-radius: 999px;
        padding: 17px 24px;
        background: #07101f;
        color: #ffffff;
        font-size: 16px;
        font-weight: 900;
        cursor: pointer;
    }

    .clean-login-card small {
        display: block;
        margin-top: 18px;
        color: #667085;
        text-align: center;
    }
</style>

<section class="clean-admin-login">
    <div class="clean-login-card">
        <span>/ Admin Area</span>
        <h1>Login</h1>

        <form method="post" action="{% url 'admin_login' %}">
            {% csrf_token %}
            <input type="text" name="username" placeholder="Username" autocomplete="username" required>
            <input type="password" name="password" placeholder="Password" autocomplete="current-password" required>
            <button type="submit">Login</button>
        </form>

        <small></small>
    </div>
</section>

{% endblock %}
